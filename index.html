<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projeto | Dashboard de Vendas</title>
  <meta name="description" content="Acesse o dashboard interativo de análise de vendas." />
  <style>
    :root {
      --bg: #0f0f12; --card: #15151b; --text: #eaeaea; --muted: #a8a8b3; --primary: #4dabf5; --primary-600: #339af0; --border: #2a2a33;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; display:flex; align-items:center; justify-content:center; margin:0; }
    .card { max-width: 820px; width: 92%; padding: 30px; border-radius: 16px; border: 1px solid var(--border); background: linear-gradient(180deg, #14141a 0%, var(--card) 100%); box-shadow: 0 18px 50px rgba(0,0,0,0.35); }
    .header { display:flex; align-items:center; gap: 16px; }
    .logo { width: 44px; height: 44px; border-radius: 8px; background: #1f2430; display:flex; align-items:center; justify-content:center; color: var(--primary); font-weight: 700; }
    h1 { font-size: 1.6rem; font-weight:700; margin:0; }
    .desc { margin: 8px 0 18px; color: var(--muted); line-height:1.6; }
    .actions { display:flex; gap:12px; align-items:center; }
    .btn { appearance:none; border:1px solid transparent; background: var(--primary); color:#0b1b2a; font-weight:700; padding: 12px 18px; border-radius: 10px; cursor:pointer; transition: all .18s ease; text-decoration:none; display:inline-flex; align-items:center; gap:10px; }
    .btn:hover { background: var(--primary-600); transform: translateY(-1px); }
    .link { color: #7bd389; text-decoration: none; }
    .link:hover { text-decoration: underline; }
    .hint { margin-top: 12px; color: var(--muted); font-size: 13px; }
    @media (max-width: 640px) { .actions { flex-direction: column; align-items: stretch; } .btn { justify-content: center; } }
  </style>
</head>
<body>
  <main class="card" aria-label="Acesso ao dashboard de vendas">
    <div class="header">
      <div class="logo" aria-hidden="true">DV</div>
      <div>
        <h1>Bem-vindo ao projeto</h1>
        <p class="desc">Clique abaixo para acessar o dashboard interativo de análise de vendas.</p>
      </div>
    </div>
    <div class="actions">
      <a href="./dashboard/dashboard_vendas.html" class="btn" aria-label="Abrir dashboard interativo">
        Abrir Dashboard
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7 17L17 7" stroke="#0b1b2a" stroke-width="2" stroke-linecap="round"/>
          <path d="M9 7H17V15" stroke="#0b1b2a" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </a>
      <a href="./dashboard/" class="link">Link direto para o dashboard</a>
    </div>
    <p class="hint">Se não abrir, verifique sua conexão e tente novamente.</p>
  </main>
</body>
</html>
